name: Sync Workflows

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: sync-workflows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  get-token:
    name: Get GitHub App Token
    runs-on: ubuntu-latest
    outputs:
      token: ${{ steps.app-token.outputs.token }}
    steps:
      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: app-token
        with:
          app-id: ${{ vars.PLATFORM_TOKEN_APP_ID }}
          private-key: ${{ secrets.PLATFORM_TOKEN_APP_PRIVATE_KEY }}

  sync-workflows:
    name: Sync Workflow Files
    needs: get-token
    uses: navikt/crm-workflows-base/.github/workflows/workflow-sync.yml@388c7d44b1bf459495cd4328c8c434ae81d22e6f
    permissions:
      contents: write # Required for creating and pushing commits in the reusable workflow
      pull-requests: write # Required for creating pull requests in the reusable workflow
    secrets:
      TOKEN: ${{ needs.get-token.outputs.token }}
